<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot password</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/forgotpassword.css" />
  </head>
  <body>
    <section class="main-section">
      <div class="container">
        <div class="main-div">
          <div class="main-logo">
            <img src="./assets-login/Group 33.jpg" alt="logo" />
          </div>

          <div class="main-para">Endless Solutions, Unwavering Service</div>
          <div class="header">Fast • Fair • Firm</div>

          <div class="blur-div">
            <h2>Forgot Password</h2>

            <form id="client-form" class="login-form">
              <div class="email-field">
                <img src="./assets-login/Group.png" alt="" />
                <input
                  type="email"
                  placeholder="Enter your registered mail Id"
                />
              </div>

              <button type="button" class="btn" id="forgotPass">
                Continue
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>

    <script>
      const forgotPass = document.getElementById("forgotPass");

      forgotPass.addEventListener("click", () => {
        window.location.href = "verification.html";
      });
    </script>
  </body>
</html>
