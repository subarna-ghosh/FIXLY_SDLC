<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/login.css" />

    <style>
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <section class="main-section">
      <div class="container">
        <div class="main-div">
          <div class="main-logo">
            <img src="./assets-login/Group 33.jpg" alt="logo" />
          </div>
          <div class="main-para">Endless Solutions, Unwavering Service</div>
          <div class="header">Fast • Fair • Firm</div>

          <div class="blur-div">
            <h2>Login</h2>
            <div class="toggle-container">
              <div class="toggle-option active" data-target="client-form">
                Client
              </div>
              <div class="toggle-option" data-target="provider-form">
                Provider
              </div>
            </div>

            <!-- Client Login Form -->
            <form id="client-form" class="login-form">
              <div class="email-field">
                <img src="./assets-login/Group.png" alt="" />
                <input type="email" placeholder="Email Address" />
              </div>

              <div class="password-field">
                <img src="./assets-login/Frame.png" alt="" />
                <input type="password" placeholder="Enter your Password" />
              </div>

              <div class="forgot-field">
                <a href="./forgotpassword.html">Forgot Password?</a>
              </div>

              <button type="button" class="btn" id="btn-client">Sign In</button>
              <div class="btn-sign-in">
                Are you new?
                <a href="./signup.html" class="btn-sign-in-anch">Create an Account</a>
              </div>
            </form>

            <!-- Provider Login Form -->
            <form id="provider-form" class="login-form hidden">
              <div class="email-field">
                <img src="./assets-login/Group.png" alt="" />
                <input type="email" placeholder="Email Address" />
              </div>

              <div class="password-field">
                <img src="./assets-login/Frame.png" alt="" />
                <input type="password" placeholder="Enter your Password" />
              </div>

              <div class="forgot-field">
                <a href="./forgotpassword.html">Forgot Password?</a>
              </div>

              <button type="button" class="btn" id="btn-provider">
                Sign In
              </button>
              <div class="btn-sign-in">
                Are you new?
                <a href="./signup.html" class="btn-sign-in-anch">Create an Account</a>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Toggle Script -->
      <script>
        const toggleOptions = document.querySelectorAll(".toggle-option");
        const forms = {
          "client-form": document.getElementById("client-form"),
          "provider-form": document.getElementById("provider-form"),
        };

        toggleOptions.forEach((option) => {
          option.addEventListener("click", function () {
            toggleOptions.forEach((opt) => opt.classList.remove("active"));
            this.classList.add("active");

            // Toggle forms
            const target = this.getAttribute("data-target");
            Object.keys(forms).forEach((key) => {
              forms[key].classList.add("hidden");
            });
            forms[target].classList.remove("hidden");
          });
        });

        const signIn = document.getElementById("btn-client");

        signIn.addEventListener("click", () => {
          window.location.href = "index.html";
        });

        const signInProv = document.getElementById("btn-provider");

        signInProv.addEventListener("click", () => {
          window.location.href = "";
        });
      </script>

      <!-- Bootstrap JS -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    </section>
  </body>
</html>
