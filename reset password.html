<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset password</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/reset password.css" />
  </head>
  <body>
    <section class="main-section">
      <div class="container">
        <div class="main-div">
          <div class="main-logo">
            <img src="./assets-login/Group 33.jpg" alt="logo" />
          </div>

          <div class="main-para">Endless Solutions, Unwavering Service</div>
          <div class="header">Fast • Fair • Firm</div>

          <div class="blur-div">
            <h2>Reset Password</h2>

            <form id="client-form" class="login-form">

              <div class="new-password-field">
                <img src="./assets-login/Frame.png" alt="" />
                <input type="password" name="new" id="new" placeholder="New Password">
              </div>

              <div class="confirm-password-field">
                <img src="./assets-login/Frame.png" alt="" />
                 <input type="password" name="confirm" id="confirm" placeholder="Confirm Password">
              </div>

              <button type="button" class="btn" id="resetBtn">Continue</button>
              
            </form>
          </div>
        </div>
      </div>
    </section>
    <script>
      const resetBtn = document.getElementById("resetBtn");

      resetBtn.addEventListener("click", () => {
        window.location.href = "login.html";
      });
    </script>
  </body>
</html>
