<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/signup.css" />

    <style>
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <section class="main-section">
      <div class="container">
        <div class="main-div">
          <div class="main-logo">
            <img src="./assets-signup/Group 33.jpg" alt="logo" />
          </div>
          <div class="main-para">Endless Solutions, Unwavering Service</div>
          <div class="header">Fast • Fair • Firm</div>

          <div class="blur-div">
            <h2>Sign Up</h2>
            <div class="toggle-container">
              <div class="toggle-option active" data-target="client-form">
                Client
              </div>
              <div class="toggle-option" data-target="provider-form">
                Provider
              </div>
            </div>

            <!-- Client Login Form -->
            <form id="client-form" class="login-form">
              <div class="name-field">
                <img src="./assets-signup/Vector.png" alt="" />
                <input type="text" placeholder="Full Name" />
              </div>

              <div class="email-field">
                <img src="./assets-signup/Group.png" alt="" />
                <input type="email" placeholder="Email Address" />
              </div>

              <div class="address-field">
                <img src="./assets-signup/textalign-justifycenter.png" alt="" />
                <input type="text" placeholder="Address" />
              </div>

              <div class="gender-field">
                <img src="./assets-signup/Grnder icon.png" alt="" />
                <select name="gender" id="gender">
                  <option value="gender-one">Gender</option>
                  <option value="gender-one">Female</option>
                  <option value="gender-one">Male</option>
                </select>
              </div>

              <div class="password-field">
                <img src="./assets-signup/Frame.png" alt="" />
                <input type="password" placeholder="Password" />
              </div>

              <div class="confirm-password-field">
                <img src="./assets-signup/Frame.png" alt="" />
                <input type="password" placeholder="Confirm Password" />
              </div>

              <div class="check-field">
                <input type="checkbox" name="menu" id="menu" />
                <label for="menu">I agree with the Terms & conditions</label>
              </div>

              <button type="button" class="btn" id="signUpClient">Sign In</button>

              <div class="btn-sign-in">
                Already have an Account?
                <a href="#" class="btn-sign-in-anch">Sign Up</a>
              </div>
            </form>

            <!-- Provider Login Form -->
            <form id="provider-form" class="login-form hidden">
              <div class="name-field">
                <img src="./assets-signup/Vector.png" alt="" />
                <input type="text" placeholder="Full Name" />
              </div>
              <div class="email-field">
                <img src="./assets-login/Group.png" alt="" />
                <input type="email" placeholder="Email Address" />
              </div>

              <div class="address-field">
                <img src="./assets-signup/textalign-justifycenter.png" alt="" />
                <input type="text" placeholder="Address" />
              </div>

              <div class="gender-field">
                <img src="./assets-signup/Grnder icon.png" alt="" />
                <select name="gender" id="gender">
                  <option value="gender-one">Gender</option>
                  <option value="gender-one">Female</option>
                  <option value="gender-one">Male</option>
                </select>
              </div>

              <div class="category-field">
                <img src="./assets-signup/textalign-justifycenter.png" alt="" />
                <select name="category" id="category">
                  <option value="categ">Category</option>
                  <option value="categ-one">Category-one</option>
                  <option value="categ-one">Category-two</option>
                </select>
              </div>

              <div class="password-field">
                <img src="./assets-login/Frame.png" alt="" />
                <input type="password" placeholder="Password" />
              </div>
              <div class="confirm-password-field">
                <img src="./assets-signup/Frame.png" alt="" />
                <input type="password" placeholder="Confirm Password" />
              </div>

              <div class="check-field">
                <input type="checkbox" name="menu" id="menu" />
                <label for="menu">I agree with the Terms & conditions</label>
              </div>

              <button type="button" class="btn">Sign In</button>

              <div class="btn-sign-in">
                Already have an Account?
                <a href="#" class="btn-sign-in-anch">Sign Up</a>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Toggle Script -->
      <script>
        const toggleOptions = document.querySelectorAll(".toggle-option");
        const forms = {
          "client-form": document.getElementById("client-form"),
          "provider-form": document.getElementById("provider-form"),
        };

        toggleOptions.forEach((option) => {
          option.addEventListener("click", function () {
            toggleOptions.forEach((opt) => opt.classList.remove("active"));
            this.classList.add("active");

            // Toggle forms
            const target = this.getAttribute("data-target");
            Object.keys(forms).forEach((key) => {
              forms[key].classList.add("hidden");
            });
            forms[target].classList.remove("hidden");
          });
        });

        const signUpClient = document.getElementById("signUpClient");

        signUpClient.addEventListener("click", () => {
          window.location.href = "index.html";
        });
      </script>

      <!-- Bootstrap JS -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    </section>
  </body>
</html>
