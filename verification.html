<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verification</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/verification.css" />
  </head>
  <body>
    <section class="main-section">
      <div class="container">
        <div class="main-div">
          <div class="main-logo">
            <img src="./assets-login/Group 33.jpg" alt="logo" />
          </div>

          <div class="main-para">Endless Solutions, Unwavering Service</div>
          <div class="header">Fast • Fair • Firm</div>

          <div class="blur-div">
            <h2>Verification</h2>
            <p>We have sent an OTP in your registered Email Id</p>

            <form id="client-form" class="login-form">
              <div class="block-field">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
              </div>

              <button type="button" class="btn" id="verifyBtn">verify</button>
              <div class="btn-sign-in">
                Didn't received yet?
                <a href="./signup.html" class="btn-sign-in-anch"
                  >Resend it in 01.00</a
                >
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
    <script>
      const verifyBtn = document.getElementById("verifyBtn");

      verifyBtn.addEventListener("click", () => {
        window.location.href = "reset password.html";
      });
    </script>
  </body>
</html>
